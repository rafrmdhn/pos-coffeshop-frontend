  /api/vouchers/validate:
    post:
      tags: [ Vouchers ]
      summary: Validasi kode voucher
      description: |
        Memeriksa apakah kode voucher valid dan menghitung diskon yang akan diberikan berdasarkan subtotal.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.
        Jika belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.

        **Validasi:**
        1. Kode ada dan `is_active = true`
        2. Tanggal hari ini dalam range `valid_from` — `valid_until`
        3. `usage_count < usage_limit`
        4. `subtotal >= min_purchase`
        5. Voucher berlaku untuk outlet ini (atau global)

        **Permission:** `apply-voucher`
      operationId: validateVoucher
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateVoucherRequest"
      responses:
        "200":
          description: Voucher valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateVoucherResponse"
        "404":
          description: Kode voucher tidak ditemukan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Kode voucher tidak ditemukan."
        "422":
          description: Voucher tidak valid (expired, usage limit, min purchase)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Voucher sudah tidak berlaku atau minimum pembelian belum tercapai."

