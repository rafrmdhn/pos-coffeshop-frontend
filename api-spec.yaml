openapi: 3.1.0
info:
  title: POS Multi-Outlet Coffee Shop API
  description: |
    REST API untuk Sistem Point of Sale (POS) Multi-Outlet Coffee Shop.

    ## Authentication
    API menggunakan **Laravel Sanctum** bearer token authentication.
    - **Owner & Manager**: Login via email + password → mendapat bearer token.
    - **Cashier**: Login via PIN 4-6 digit → mendapat bearer token (memerlukan sesi outlet aktif).
    - Token dikirim melalui header `Authorization: Bearer {token}`.

    ## Data Isolation
    Semua data di-scope per `outlet_id` secara otomatis via Laravel Global Scope.
    Manager dan Cashier hanya melihat outlet mereka.
    Untuk endpoint operasional, Owner wajib memilih `current_outlet` terlebih dahulu.
    Jika `current_outlet` belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.
    Untuk operasi berbasis outlet (contoh: transaksi, shift, expense), Owner menggunakan
    `current_outlet` (konteks outlet aktif) yang dapat diatur via endpoint context auth.

    ## UUID
    Semua resource menggunakan UUID v7 sebagai primary key.
    Pada endpoint transaksi, UUID dapat di-generate di client-side (untuk offline support).

    ## Pagination
    Endpoint list menggunakan cursor-based atau offset pagination dengan format standar Laravel.
  version: 1.0.0
  contact:
    name: Developer Team

servers:
  - url: https://api.kopinusantara.id
    description: Production Server
  - url: http://localhost:8000
    description: Local Development

tags:
  - name: Auth
    description: Autentikasi & manajemen sesi
  - name: Outlets
    description: Manajemen cabang/outlet (Owner only)
  - name: Users
    description: Manajemen pengguna & role
  - name: Categories
    description: Manajemen kategori produk
  - name: Products
    description: Manajemen produk/menu
  - name: Recipes
    description: Manajemen resep/BOM (Bill of Materials)
  - name: Inventory
    description: Manajemen bahan baku & stok
  - name: Transactions
    description: Transaksi penjualan & POS
  - name: Shifts
    description: Manajemen shift kasir & blind drop
  - name: Expenses
    description: Pencatatan pengeluaran operasional (OPEX)
  - name: Vouchers
    description: Manajemen voucher diskon
  - name: Roles & Permissions
    description: Manajemen role & permission dinamis (Owner only)
  - name: Audit Logs
    description: Rekam jejak aktivitas krusial pengguna
  - name: Reports
    description: Laporan & dashboard analytics

# ============================================================
# SECURITY SCHEMES
# ============================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum Token
      description: |
        Token didapat dari endpoint `POST /api/auth/login` atau `POST /api/auth/pin`.
        Kirim token via header: `Authorization: Bearer {token}`

  # ==========================================================
  # REUSABLE PARAMETERS
  # ==========================================================
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: UUID resource
      schema:
        type: string
        format: uuid
        example: "01912345-abcd-7def-8901-234567890abc"

    QueryPage:
      name: page
      in: query
      required: false
      description: Nomor halaman (pagination)
      schema:
        type: integer
        minimum: 1
        default: 1

    QueryPerPage:
      name: per_page
      in: query
      required: false
      description: Jumlah item per halaman
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15

    QuerySearch:
      name: search
      in: query
      required: false
      description: Kata kunci pencarian
      schema:
        type: string

    QuerySortBy:
      name: sort_by
      in: query
      required: false
      description: Kolom untuk sorting
      schema:
        type: string

    QuerySortDir:
      name: sort_dir
      in: query
      required: false
      description: Arah sorting
      schema:
        type: string
        enum: [ asc, desc ]
        default: desc

    QueryDateFrom:
      name: date_from
      in: query
      required: false
      description: Filter tanggal awal (YYYY-MM-DD)
      schema:
        type: string
        format: date

    QueryDateTo:
      name: date_to
      in: query
      required: false
      description: Filter tanggal akhir (YYYY-MM-DD)
      schema:
        type: string
        format: date

  # ==========================================================
  # REUSABLE SCHEMAS
  # ==========================================================
  schemas:
    # ----------------------------------------------------------
    # Common
    # ----------------------------------------------------------
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 73
        from:
          type: integer
          example: 1
        to:
          type: integer
          example: 15

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          example: "https://api.kopinusantara.id/api/products?page=1"
        last:
          type: string
          example: "https://api.kopinusantara.id/api/products?page=5"
        prev:
          type: [ string, "null" ]
          example: null
        next:
          type: [ string, "null" ]
          example: "https://api.kopinusantara.id/api/products?page=2"

    ErrorResponse:
      type: object
      required: [ success, message ]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "The given data was invalid."
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: [ "The email field is required." ]

    UnauthenticatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Unauthenticated."

    ForbiddenResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "You do not have the required permission."

    NotFoundResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Resource not found."

    Timestamps:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          example: "2026-04-12T07:30:00.000000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-12T07:30:00.000000Z"

    # ----------------------------------------------------------
    # Auth
    # ----------------------------------------------------------
    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          example: "budi.manager@kopinusantara.id"
        password:
          type: string
          format: password
          minLength: 8
          example: "password"
        device_name:
          type: string
          description: Identifier device untuk token naming
          example: "tablet-outlet-kemang"

    PinLoginRequest:
      type: object
      required: [ pin, outlet_id ]
      properties:
        pin:
          type: string
          minLength: 4
          maxLength: 6
          pattern: "^[0-9]{4,6}$"
          example: "1234"
        outlet_id:
          type: string
          format: uuid
          description: ID outlet yang sedang aktif di tablet
          example: "01912345-abcd-7def-8901-234567890abc"

    SetActiveOutletContextRequest:
      type: object
      required: [ outlet_id ]
      properties:
        outlet_id:
          type: string
          format: uuid
          description: Outlet aktif yang dipilih Owner untuk konteks operasional.
          example: "01912345-abcd-7def-8901-234567890abc"

    SetActiveOutletContextResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Outlet aktif berhasil diperbarui."
        data:
          type: object
          properties:
            current_outlet:
              anyOf:
                - $ref: "#/components/schemas/OutletSimple"
                - type: "null"

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Budi Santoso"
        email:
          type: string
          format: email
          example: "budi.manager@kopinusantara.id"
        phone:
          type: [ string, "null" ]
          example: "08123456789"
        avatar_url:
          type: [ string, "null" ]
        is_active:
          type: boolean
          example: true
        outlet:
          anyOf:
            - $ref: "#/components/schemas/OutletSimple"
            - type: "null"
        current_outlet:
          anyOf:
            - $ref: "#/components/schemas/OutletSimple"
            - type: "null"
          description: |
            Outlet aktif untuk konteks operasional Owner.
            Untuk Manager/Cashier umumnya bernilai null.
        roles:
          type: array
          items:
            type: string
          example: [ "manager" ]
        permissions:
          type: array
          items:
            type: string
          example:
            - "view-products"
            - "manage-products"
            - "create-transaction"
            - "open-close-shift"

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Login berhasil."
        data:
          type: object
          properties:
            token:
              type: string
              example: "1|aBcDeFgHiJkLmNoPqRsTuVwXyZ123456789"
            token_type:
              type: string
              example: "Bearer"
            expires_at:
              type: string
              format: date-time
              example: "2026-04-13T07:30:00.000000Z"
            user:
              $ref: "#/components/schemas/AuthUser"

    # ----------------------------------------------------------
    # Outlet
    # ----------------------------------------------------------
    OutletSimple:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Kopi Nusantara - Kemang"
        slug:
          type: string
          example: "kopi-nusantara-kemang"

    Outlet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Kopi Nusantara - Kemang"
        slug:
          type: string
          example: "kopi-nusantara-kemang"
        address:
          type: [ string, "null" ]
          example: "Jl. Kemang Raya No. 10, Jakarta Selatan"
        phone:
          type: [ string, "null" ]
          example: "021-55501234"
        tax_id:
          type: [ string, "null" ]
        timezone:
          type: string
          example: "Asia/Jakarta"
        receipt_header:
          type: [ string, "null" ]
        receipt_footer:
          type: [ string, "null" ]
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreOutletRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 100
          example: "Kopi Nusantara - Kemang"
        address:
          type: [ string, "null" ]
          example: "Jl. Kemang Raya No. 10"
        phone:
          type: [ string, "null" ]
          maxLength: 20
          example: "021-55501234"
        tax_id:
          type: [ string, "null" ]
          maxLength: 50
        timezone:
          type: string
          default: "Asia/Jakarta"
        receipt_header:
          type: [ string, "null" ]
        receipt_footer:
          type: [ string, "null" ]
        is_active:
          type: boolean
          default: true

    # ----------------------------------------------------------
    # User
    # ----------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: [ string, "null" ]
          format: uuid
        outlet:
          $ref: "#/components/schemas/OutletSimple"
        name:
          type: string
          example: "Sari Dewi"
        email:
          type: string
          format: email
        phone:
          type: [ string, "null" ]
        avatar_url:
          type: [ string, "null" ]
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
          example: [ "cashier" ]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreUserRequest:
      type: object
      required: [ name, email, password, role ]
      properties:
        name:
          type: string
          maxLength: 100
          example: "Sari Dewi"
        email:
          type: string
          format: email
          maxLength: 150
          example: "sari@kopinusantara.id"
        password:
          type: string
          format: password
          minLength: 8
          example: "securepassword"
        password_confirmation:
          type: string
          format: password
          example: "securepassword"
        phone:
          type: [ string, "null" ]
          maxLength: 20
        outlet_id:
          type: [ string, "null" ]
          format: uuid
          description: Wajib untuk Manager/Cashier. NULL untuk Owner.
        role:
          type: string
          enum: [ owner, manager, cashier ]
          example: "cashier"
        pin:
          type: string
          minLength: 4
          maxLength: 6
          pattern: "^[0-9]{4,6}$"
          description: Wajib untuk role Cashier
          example: "1234"
        is_active:
          type: boolean
          default: true

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: [ string, "null" ]
        outlet_id:
          type: [ string, "null" ]
          format: uuid
        role:
          type: string
          enum: [ owner, manager, cashier ]
        pin:
          type: [ string, "null" ]
          minLength: 4
          maxLength: 6
        password:
          type: string
          format: password
          minLength: 8
          description: Isi jika ingin mengubah password
        password_confirmation:
          type: string
          format: password
        is_active:
          type: boolean

    # ----------------------------------------------------------
    # Category
    # ----------------------------------------------------------
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Espresso Based"
        slug:
          type: string
          example: "espresso-based"
        description:
          type: [ string, "null" ]
        sort_order:
          type: integer
          example: 1
        is_active:
          type: boolean
          example: true
        products_count:
          type: integer
          description: Jumlah produk dalam kategori (when loaded)
          example: 9
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreCategoryRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          maxLength: 80
          example: "Espresso Based"
        description:
          type: [ string, "null" ]
          maxLength: 255
        sort_order:
          type: integer
          default: 0
        is_active:
          type: boolean
          default: true

    # ----------------------------------------------------------
    # Product
    # ----------------------------------------------------------
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/Category"
        name:
          type: string
          example: "Caramel Latte"
        slug:
          type: string
          example: "caramel-latte"
        description:
          type: [ string, "null" ]
        image_url:
          type: [ string, "null" ]
        price:
          type: number
          format: double
          example: 32000.00
        sku:
          type: [ string, "null" ]
          example: "ESP-CRL-001"
        is_active:
          type: boolean
          example: true
        track_stock:
          type: boolean
          example: true
        sort_order:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreProductRequest:
      type: object
      required: [ category_id, name, price ]
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
          example: "Caramel Latte"
        description:
          type: [ string, "null" ]
        image:
          type: string
          format: binary
          description: File gambar produk (jpg, png, webp; max 2MB)
        price:
          type: number
          format: double
          minimum: 0
          example: 32000
        sku:
          type: [ string, "null" ]
          maxLength: 50
        is_active:
          type: boolean
          default: true
        track_stock:
          type: boolean
          default: true
        sort_order:
          type: integer
          default: 0

    # ----------------------------------------------------------
    # Recipe (BOM)
    # ----------------------------------------------------------
    RecipeItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        raw_material_id:
          type: string
          format: uuid
        raw_material:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Biji Kopi Arabica"
            unit:
              type: string
              example: "gram"
            cost_per_unit:
              type: number
              format: double
              example: 0.35
        quantity_needed:
          type: number
          format: double
          example: 18.000
        estimated_cost:
          type: number
          format: double
          description: "cost_per_unit × quantity_needed"
          example: 6.30

    UpdateRecipeRequest:
      type: object
      required: [ ingredients ]
      properties:
        ingredients:
          type: array
          description: Array lengkap bahan baku. Menggantikan semua recipe sebelumnya
            (sync strategy).
          items:
            type: object
            required: [ raw_material_id, quantity_needed ]
            properties:
              raw_material_id:
                type: string
                format: uuid
              quantity_needed:
                type: number
                format: double
                minimum: 0.001
                example: 18.000

    # ----------------------------------------------------------
    # Inventory (Raw Materials)
    # ----------------------------------------------------------
    RawMaterial:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Biji Kopi Arabica"
        unit:
          type: string
          example: "gram"
        current_stock:
          type: number
          format: double
          example: 5000.000
        min_stock:
          type: number
          format: double
          example: 1000.000
        cost_per_unit:
          type: number
          format: double
          example: 0.35
        is_low_stock:
          type: boolean
          description: "true jika current_stock <= min_stock"
          example: false
        last_restock_at:
          type: [ string, "null" ]
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreRawMaterialRequest:
      type: object
      required: [ name, unit, cost_per_unit ]
      properties:
        name:
          type: string
          maxLength: 100
          example: "Biji Kopi Arabica"
        unit:
          type: string
          maxLength: 20
          enum: [ gram, ml, pcs, kg, liter ]
          example: "gram"
        current_stock:
          type: number
          format: double
          minimum: 0
          default: 0
        min_stock:
          type: number
          format: double
          minimum: 0
          default: 0
        cost_per_unit:
          type: number
          format: double
          minimum: 0
          example: 0.35

    UpdateRawMaterialRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        unit:
          type: string
          enum: [ gram, ml, pcs, kg, liter ]
        current_stock:
          type: number
          format: double
          minimum: 0
        min_stock:
          type: number
          format: double
          minimum: 0
        cost_per_unit:
          type: number
          format: double
          minimum: 0

    # ----------------------------------------------------------
    # Transaction
    # ----------------------------------------------------------
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        shift_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        voucher_id:
          type: [ string, "null" ]
          format: uuid
        transaction_number:
          type: string
          example: "TRX-20260412-0001"
        order_type:
          type: string
          enum: [ dine_in, takeaway ]
          example: "dine_in"
        subtotal:
          type: number
          format: double
          example: 60000.00
        discount_amount:
          type: number
          format: double
          example: 5000.00
        tax_rate:
          type: number
          format: double
          example: 10.00
        tax_amount:
          type: number
          format: double
          example: 5500.00
        grand_total:
          type: number
          format: double
          example: 60500.00
        status:
          type: string
          enum: [ completed, voided ]
          example: "completed"
        source:
          type: string
          enum: [ online, offline ]
          example: "online"
        notes:
          type: [ string, "null" ]
        voided_by:
          type: [ string, "null" ]
          format: uuid
        void_reason:
          type: [ string, "null" ]
        voided_at:
          type: [ string, "null" ]
          format: date-time
        transaction_date:
          type: string
          format: date-time
        synced_at:
          type: [ string, "null" ]
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/TransactionPayment"
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Sari Dewi"
        voucher:
          type: [ object, "null" ]
          properties:
            id:
              type: string
              format: uuid
            code:
              type: string
              example: "GRAND10"
            name:
              type: string
              example: "Grand Opening 10%"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TransactionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        product_name:
          type: string
          example: "Caramel Latte"
        product_price:
          type: number
          format: double
          example: 32000.00
        quantity:
          type: integer
          example: 2
        notes:
          type: [ string, "null" ]
          example: "Less sugar"
        subtotal:
          type: number
          format: double
          example: 64000.00

    TransactionPayment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_method:
          type: string
          enum: [ cash, qris ]
          example: "cash"
        amount:
          type: number
          format: double
          example: 60500.00
        cash_received:
          type: [ number, "null" ]
          format: double
          example: 100000.00
        cash_change:
          type: [ number, "null" ]
          format: double
          example: 39500.00
        reference_number:
          type: [ string, "null" ]

    StoreTransactionRequest:
      type: object
      required: [ order_type, items, payments ]
      properties:
        id:
          type: string
          format: uuid
          description: Client-generated UUID (untuk offline support). Opsional; server
            akan generate jika kosong.
        order_type:
          type: string
          enum: [ dine_in, takeaway ]
          example: "dine_in"
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [ product_id, quantity ]
            properties:
              product_id:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
                example: 2
              notes:
                type: [ string, "null" ]
                maxLength: 255
                example: "Less sugar"
        payments:
          type: array
          minItems: 1
          description: Mendukung split payment (multiple entries)
          items:
            type: object
            required: [ payment_method, amount ]
            properties:
              payment_method:
                type: string
                enum: [ cash, qris ]
                example: "cash"
              amount:
                type: number
                format: double
                minimum: 0
                example: 60500.00
              cash_received:
                type: [ number, "null" ]
                format: double
                description: Wajib untuk metode cash
                example: 100000.00
              reference_number:
                type: [ string, "null" ]
                description: Nomor referensi QRIS (opsional)
        voucher_code:
          type: [ string, "null" ]
          description: Kode voucher yang diaplikasikan
          example: "GRAND10"
        notes:
          type: [ string, "null" ]
          example: "Meja 5"
        transaction_date:
          type: string
          format: date-time
          description: Waktu transaksi aktual (diperlukan saat offline sync; default now)
        source:
          type: string
          enum: [ online, offline ]
          default: "online"
          description: Asal transaksi

    SyncTransactionsRequest:
      type: object
      required: [ transactions ]
      properties:
        transactions:
          type: array
          description: Batch transaksi offline yang perlu disinkronisasi
          items:
            allOf:
              - $ref: "#/components/schemas/StoreTransactionRequest"
              - type: object
                required: [ id, transaction_date, source ]
                properties:
                  id:
                    type: string
                    format: uuid
                    description: UUID yang di-generate di client saat offline
                  source:
                    type: string
                    enum: [ offline ]
                    example: "offline"

    SyncTransactionsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Sinkronisasi selesai. 5 berhasil, 0 gagal."
        data:
          type: object
          properties:
            total:
              type: integer
              example: 5
            synced:
              type: integer
              example: 5
            failed:
              type: integer
              example: 0
            results:
              type: array
              items:
                type: object
                properties:
                  client_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [ synced, duplicate, failed ]
                  transaction_number:
                    type: [ string, "null" ]
                    example: "TRX-20260412-0003"
                  error:
                    type: [ string, "null" ]

    VoidTransactionRequest:
      type: object
      required: [ reason ]
      properties:
        reason:
          type: string
          minLength: 5
          maxLength: 500
          example: "Pesanan salah, pelanggan membatalkan"

    # ----------------------------------------------------------
    # Shift
    # ----------------------------------------------------------
    Shift:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        opened_by:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Budi Santoso"
        closed_by:
          type: [ object, "null" ]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Budi Santoso"
        opening_cash:
          type: number
          format: double
          example: 500000.00
        expected_cash:
          type: number
          format: double
          example: 1250000.00
        actual_cash:
          type: [ number, "null" ]
          format: double
          example: 1245000.00
        cash_difference:
          type: [ number, "null" ]
          format: double
          example: -5000
        total_transactions:
          type: integer
          example: 42
        total_revenue:
          type: number
          format: double
          example: 1850000.00
        total_cash_sales:
          type: number
          format: double
          example: 1200000.00
        total_qris_sales:
          type: number
          format: double
          example: 650000.00
        status:
          type: string
          enum: [ open, closed ]
          example: "open"
        opened_at:
          type: string
          format: date-time
        closed_at:
          type: [ string, "null" ]
          format: date-time
        notes:
          type: [ string, "null" ]
        shift_counts:
          type: array
          description: Detail blind drop (hanya saat closed)
          items:
            $ref: "#/components/schemas/ShiftCount"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ShiftCount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        denomination:
          type: integer
          example: 50000
        qty:
          type: integer
          example: 10
        subtotal:
          type: number
          format: double
          example: 500000.00

    OpenShiftRequest:
      type: object
      required: [ opening_cash ]
      properties:
        opening_cash:
          type: number
          format: double
          minimum: 0
          example: 500000.00
        notes:
          type: [ string, "null" ]

    CloseShiftRequest:
      type: object
      required: [ counts ]
      properties:
        counts:
          type: array
          description: Perhitungan uang fisik per denominasi (blind drop)
          items:
            type: object
            required: [ denomination, qty ]
            properties:
              denomination:
                type: integer
                enum: [ 100000, 50000, 20000, 10000, 5000, 2000, 1000, 500, 200, 100 ]
                example: 50000
              qty:
                type: integer
                minimum: 0
                example: 10
        notes:
          type: [ string, "null" ]
          example: "Uang Rp 5.000 kurang 1 lembar"

    # ----------------------------------------------------------
    # Expense
    # ----------------------------------------------------------
    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: string
          format: uuid
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Budi Santoso"
        category:
          type: string
          enum: [ salary, rent, utilities, supplies, maintenance, marketing, other ]
          example: "utilities"
        description:
          type: string
          example: "Listrik bulan April 2026"
        amount:
          type: number
          format: double
          example: 2500000.00
        expense_date:
          type: string
          format: date
          example: "2026-04-01"
        reference_number:
          type: [ string, "null" ]
          example: "PLN-04/2026"
        notes:
          type: [ string, "null" ]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreExpenseRequest:
      type: object
      required: [ category, description, amount, expense_date ]
      properties:
        category:
          type: string
          enum: [ salary, rent, utilities, supplies, maintenance, marketing, other ]
          example: "utilities"
        description:
          type: string
          maxLength: 255
          example: "Listrik bulan April 2026"
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 2500000
        expense_date:
          type: string
          format: date
          example: "2026-04-01"
        reference_number:
          type: [ string, "null" ]
          maxLength: 50
        notes:
          type: [ string, "null" ]

    # ----------------------------------------------------------
    # Voucher
    # ----------------------------------------------------------
    Voucher:
      type: object
      properties:
        id:
          type: string
          format: uuid
        outlet_id:
          type: [ string, "null" ]
          format: uuid
        code:
          type: string
          example: "GRAND10"
        name:
          type: string
          example: "Grand Opening 10%"
        discount_type:
          type: string
          enum: [ percentage, fixed ]
          example: "percentage"
        discount_value:
          type: number
          format: double
          example: 10.00
        min_purchase:
          type: number
          format: double
          example: 50000.00
        max_discount:
          type: [ number, "null" ]
          format: double
          example: 30000.00
        usage_limit:
          type: [ integer, "null" ]
          example: 100
        usage_count:
          type: integer
          example: 23
        valid_from:
          type: string
          format: date
          example: "2026-04-01"
        valid_until:
          type: string
          format: date
          example: "2026-04-30"
        is_active:
          type: boolean
          example: true
        is_valid:
          type: boolean
          description: "Computed: is_active AND within date range AND usage < limit"
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StoreVoucherRequest:
      type: object
      required: [ code, name, discount_type, discount_value, valid_from, valid_until ]
      properties:
        code:
          type: string
          maxLength: 30
          example: "GRAND10"
        name:
          type: string
          maxLength: 100
          example: "Grand Opening 10%"
        discount_type:
          type: string
          enum: [ percentage, fixed ]
        discount_value:
          type: number
          format: double
          minimum: 0.01
          example: 10
        min_purchase:
          type: number
          format: double
          minimum: 0
          default: 0
        max_discount:
          type: [ number, "null" ]
          format: double
          description: Hanya relevan untuk discount_type=percentage
        usage_limit:
          type: [ integer, "null" ]
          minimum: 1
        valid_from:
          type: string
          format: date
        valid_until:
          type: string
          format: date
        outlet_id:
          type: [ string, "null" ]
          format: uuid
          description: NULL = berlaku untuk semua outlet
        is_active:
          type: boolean
          default: true

    ValidateVoucherRequest:
      type: object
      required: [ code, subtotal ]
      properties:
        code:
          type: string
          example: "GRAND10"
        subtotal:
          type: number
          format: double
          description: Subtotal transaksi untuk validasi min_purchase
          example: 60000

    ValidateVoucherResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            voucher:
              $ref: "#/components/schemas/Voucher"
            discount_amount:
              type: number
              format: double
              description: Nominal diskon yang akan diberikan berdasarkan subtotal
              example: 6000.00
            message:
              type: string
              example: "Voucher valid. Diskon Rp 6.000 akan diberikan."

    # ----------------------------------------------------------
    # Role & Permission
    # ----------------------------------------------------------
    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "manager"
        guard_name:
          type: string
          example: "web"
        permissions:
          type: array
          items:
            type: string
          example:
            - "view-products"
            - "manage-products"
            - "create-transaction"
        users_count:
          type: integer
          description: Jumlah user yang memiliki role ini
          example: 3
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "manage-products"
        guard_name:
          type: string
          example: "web"
        description:
          type: [ string, "null" ]
          example: "Kelola data produk (create, update, delete)"

    StoreRoleRequest:
      type: object
      required: [ name, permissions ]
      properties:
        name:
          type: string
          maxLength: 125
          example: "supervisor"
          description: Nama role unik (lowercase, tanpa spasi)
        permissions:
          type: array
          minItems: 1
          description: Array nama permission yang di-assign ke role
          items:
            type: string
          example:
            - "view-products"
            - "manage-products"
            - "view-transactions"
            - "view-outlet-reports"

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 125
        permissions:
          type: array
          minItems: 1
          items:
            type: string

    # ----------------------------------------------------------
    # Audit Log
    # ----------------------------------------------------------
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          type: [ object, "null" ]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Budi Santoso"
            email:
              type: string
              example: "budi.manager@kopinusantara.id"
        outlet:
          type: [ object, "null" ]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: "Kopi Nusantara - Kemang"
        action:
          type: string
          enum: [ created, updated, deleted, voided, login, logout ]
          example: "voided"
        auditable_type:
          type: string
          description: Nama model yang diubah (short class name)
          example: "Transaction"
        auditable_id:
          type: string
          format: uuid
          example: "01912345-abcd-7def-8901-234567890abc"
        old_values:
          type: [ object, "null" ]
          description: Nilai sebelum perubahan
          example:
            status: "completed"
        new_values:
          type: [ object, "null" ]
          description: Nilai setelah perubahan
          example:
            status: "voided"
            voided_by: "01912345-xxxx-7def-8901-234567890abc"
            void_reason: "Pesanan salah"
        ip_address:
          type: [ string, "null" ]
          example: "192.168.1.100"
        user_agent:
          type: [ string, "null" ]
          example: "Mozilla/5.0 (Linux; Android 12) Chrome/120"
        created_at:
          type: string
          format: date-time
          example: "2026-04-12T10:30:00.000000Z"

    # ----------------------------------------------------------
    # Reports
    # ----------------------------------------------------------
    DashboardReport:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
              example: "2026-04-01"
            to:
              type: string
              format: date
              example: "2026-04-12"
        summary:
          type: object
          properties:
            total_revenue:
              type: number
              format: double
              description: Total omzet (grand_total dari transaksi completed)
              example: 15800000.00
            total_hpp:
              type: number
              format: double
              description: Total Harga Pokok Penjualan
              example: 4200000.00
            total_opex:
              type: number
              format: double
              description: Total pengeluaran operasional
              example: 8500000.00
            net_profit:
              type: number
              format: double
              description: "Laba bersih: revenue - hpp - opex"
              example: 3100000.00
            total_transactions:
              type: integer
              example: 523
            average_transaction:
              type: number
              format: double
              description: Rata-rata nilai transaksi
              example: 30210.00
            total_voided:
              type: integer
              example: 3
        revenue_by_day:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              revenue:
                type: number
                format: double
              transactions:
                type: integer
        revenue_by_payment_method:
          type: object
          properties:
            cash:
              type: number
              format: double
              example: 9800000.00
            qris:
              type: number
              format: double
              example: 6000000.00
        top_products:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: string
                format: uuid
              product_name:
                type: string
                example: "Caffe Latte"
              total_qty:
                type: integer
                example: 87
              total_revenue:
                type: number
                format: double
                example: 2436000.00
        expense_by_category:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                example: "salary"
              total:
                type: number
                format: double
                example: 5000000.00

    SalesReport:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        transactions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              transaction_number:
                type: string
              transaction_date:
                type: string
                format: date-time
              order_type:
                type: string
                enum: [ dine_in, takeaway ]
              grand_total:
                type: number
                format: double
              status:
                type: string
                enum: [ completed, voided ]
              cashier:
                type: string
              payment_method:
                type: string
        summary:
          type: object
          properties:
            total_revenue:
              type: number
              format: double
            total_transactions:
              type: integer
            dine_in_count:
              type: integer
            takeaway_count:
              type: integer
            voided_count:
              type: integer
            hourly_distribution:
              type: array
              items:
                type: object
                properties:
                  hour:
                    type: integer
                    example: 9
                  transactions:
                    type: integer
                    example: 12
                  revenue:
                    type: number
                    format: double

    InventoryReport:
      type: object
      properties:
        materials:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
                example: "Biji Kopi Arabica"
              unit:
                type: string
                example: "gram"
              current_stock:
                type: number
                format: double
              min_stock:
                type: number
                format: double
              cost_per_unit:
                type: number
                format: double
              total_value:
                type: number
                format: double
                description: "current_stock × cost_per_unit"
              is_low_stock:
                type: boolean
              total_consumed:
                type: number
                format: double
                description: Total konsumsi dalam periode
        summary:
          type: object
          properties:
            total_materials:
              type: integer
            low_stock_count:
              type: integer
            total_stock_value:
              type: number
              format: double
              description: Total nilai inventori

  # ==========================================================
  # REUSABLE RESPONSES
  # ==========================================================
  responses:
    "401":
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthenticatedResponse"
    "403":
      description: Forbidden — permission tidak mencukupi
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ForbiddenResponse"
    "404":
      description: Resource tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotFoundResponse"
    "422":
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

# ============================================================
# PATHS
# ============================================================
paths:
  # ============================================================
  # AUTH
  # ============================================================
  /api/auth/login:
    post:
      tags: [ Auth ]
      summary: Login dengan email & password
      description: |
        Login untuk Owner dan Manager. Mengembalikan bearer token, data user,
        outlet kerja, current outlet context (jika ada), dan daftar permissions.

        **Rate limit:** 5 percobaan per menit per IP.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Kredensial salah
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Email atau password salah."
        "422":
          $ref: "#/components/responses/422"
        "429":
          description: Terlalu banyak percobaan login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Terlalu banyak percobaan login. Silakan coba lagi dalam 60 detik."

  /api/auth/pin:
    post:
      tags: [ Auth ]
      summary: Login cepat dengan PIN (Cashier)
      description: |
        Fast PIN login untuk kasir. Memerlukan `outlet_id` aktif (sesi tablet sudah dibuka oleh Manager).
        PIN di-hash dengan bcrypt di server.

        **Rate limit:** 10 percobaan per menit per IP.
      operationId: pinLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinLoginRequest"
      responses:
        "200":
          description: PIN login berhasil
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: PIN salah atau user tidak ditemukan di outlet tersebut
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "PIN tidak valid."
        "422":
          $ref: "#/components/responses/422"

  /api/auth/logout:
    post:
      tags: [ Auth ]
      summary: Logout & revoke token
      description: Menghapus bearer token yang sedang aktif.
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logout berhasil."
        "401":
          $ref: "#/components/responses/401"

  /api/auth/me:
    get:
      tags: [ Auth ]
      summary: Data user yang sedang login
      description: Mengembalikan data user, outlet, current outlet context, roles, dan
        permissions dari token yang aktif.
      operationId: me
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Data user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AuthUser"
        "401":
          $ref: "#/components/responses/401"

  /api/auth/context/outlet:
    post:
      tags: [ Auth ]
      summary: Set outlet context aktif (Owner)
      description: |
        Menetapkan `current_outlet` untuk owner. Konteks ini digunakan pada endpoint
        berbasis outlet ketika owner tidak memiliki `outlet_id` tetap.

        **Permission:** `view-all-outlets` (Owner only)
      operationId: setActiveOutletContext
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetActiveOutletContextRequest"
      responses:
        "200":
          description: Outlet context aktif berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetActiveOutletContextResponse"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

  # ============================================================
  # OUTLETS
  # ============================================================
  /api/outlets:
    get:
      tags: [ Outlets ]
      summary: Daftar semua outlet
      description: |
        Menampilkan daftar semua outlet.

        **Permission:** `view-all-outlets` (Owner only)
      operationId: listOutlets
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QuerySearch"
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Daftar outlet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
