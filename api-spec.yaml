                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Shift berhasil ditutup."
                  data:
                    $ref: "#/components/schemas/Shift"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          description: Tidak ada shift aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Tidak ada shift aktif untuk ditutup."
        "422":
          $ref: "#/components/responses/422"

