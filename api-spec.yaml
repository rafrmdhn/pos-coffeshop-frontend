      summary: Daftar pengguna
      description: |
        Menampilkan daftar pengguna. Manager hanya melihat user di outletnya; Owner melihat semua.

        **Permission:** `manage-users` (Owner) — Manager bisa view terbatas di outletnya.
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QuerySearch"
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [ owner, manager, cashier ]
        - name: outlet_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Daftar pengguna
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

    post:
      tags: [ Users ]
      summary: Tambah pengguna baru
      description: |
        Membuat user baru dan assign role.

        **Permission:** `manage-users` (Owner only)
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreUserRequest"
      responses:
        "201":
          description: User berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Pengguna berhasil dibuat."
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

  /api/users/{id}:
    put:
      tags: [ Users ]
      summary: Update pengguna
      description: |
        Memperbarui data pengguna. Hanya field yang dikirim yang akan diupdate.

        **Permission:** `manage-users` (Owner only)
      operationId: updateUser
