                    $ref: "#/components/schemas/SalesReport"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

  /api/reports/inventory:
    get:
      tags: [ Reports ]
      summary: Laporan inventori & stok
      description: |
        Menampilkan ringkasan stok bahan baku, total konsumsi dalam periode, dan nilai inventori.

        **Permission:** `view-outlet-reports` atau `view-global-reports`
      operationId: inventoryReport
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryDateFrom"
        - $ref: "#/components/parameters/QueryDateTo"
        - name: outlet_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: low_stock_only
          in: query
          required: false
          description: Hanya tampilkan bahan dengan stok rendah
          schema:
            type: boolean
      responses:
        "200":
          description: Laporan inventori
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/InventoryReport"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

  # ============================================================
  # ROLES & PERMISSIONS
  # ============================================================
  /api/roles:
    get:
      tags: [ Roles & Permissions ]
      summary: Daftar semua role
      description: |
        Menampilkan daftar role beserta permissions yang dimiliki dan jumlah user.

        **Permission:** `manage-roles` (Owner only)
      operationId: listRoles
      security:
        - BearerAuth: []
      parameters:
        - name: with_count
          in: query
          required: false
          description: Sertakan users_count
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Daftar role
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

    post:
      tags: [ Roles & Permissions ]
      summary: Buat role baru
      description: |
        Membuat role custom baru dan assign permissions.
        Role bawaan (owner, manager, cashier) tidak boleh diduplikasi.

        **Permission:** `manage-roles` (Owner only)
      operationId: createRole
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreRoleRequest"
      responses:
        "201":
          description: Role berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Role berhasil dibuat."
                  data:
                    $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

  /api/roles/{id}:
    get:
      tags: [ Roles & Permissions ]
      summary: Detail role dengan permissions
      description: |
        Menampilkan detail role beserta daftar permissions yang dimiliki.

        **Permission:** `manage-roles` (Owner only)
      operationId: getRole
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role ID (integer)
          schema:
            type: integer
      responses:
        "200":
          description: Detail role
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"

    put:
      tags: [ Roles & Permissions ]
      summary: Update role & permissions
      description: |
        Memperbarui nama role dan/atau sync permissions. Semua permissions yang dikirim
        akan menggantikan permissions lama (sync strategy).

        **Proteksi:** Role bawaan `owner` tidak boleh diubah namanya.

        **Permission:** `manage-roles` (Owner only)
      operationId: updateRole
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Role berhasil diperbarui."
                  data:
                    $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Role bawaan tidak boleh diubah
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Role 'owner' adalah role bawaan dan tidak boleh diubah namanya."
        "422":
          $ref: "#/components/responses/422"

    delete:
      tags: [ Roles & Permissions ]
      summary: Hapus role
      description: |
        Menghapus role custom. Gagal jika masih ada user yang menggunakan role ini.
        Role bawaan (owner, manager, cashier) tidak boleh dihapus.

        **Permission:** `manage-roles` (Owner only)
      operationId: deleteRole
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Role berhasil dihapus."
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Role masih digunakan atau merupakan role bawaan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Role tidak bisa dihapus karena masih digunakan oleh 2 pengguna."

  /api/permissions:
    get:
      tags: [ Roles & Permissions ]
      summary: Daftar semua permission
      description: |
        Menampilkan daftar seluruh permission yang tersedia di sistem.
        Digunakan saat membuat/edit role untuk memilih permissions.

        **Permission:** `manage-roles` (Owner only)
      operationId: listPermissions
      security:
        - BearerAuth: []
      parameters:
        - name: group_by
          in: query
          required: false
          description: Kelompokkan permissions berdasarkan module (e.g. "products",
            "transactions")
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Daftar permission
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Permission"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

  # ============================================================
  # AUDIT LOGS
  # ============================================================
  /api/audit-logs:
    get:
      tags: [ Audit Logs ]
      summary: Daftar audit log
      description: |
        Menampilkan rekam jejak aktivitas krusial pengguna: void transaksi, perubahan harga,
        penghapusan data, login/logout, dan perubahan role.

        **Owner:** Melihat semua outlet atau filter per outlet.
        **Manager:** Hanya log di outletnya sendiri.

        **Permission:** `view-outlet-reports` atau `view-global-reports`
      operationId: listAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QueryDateFrom"
        - $ref: "#/components/parameters/QueryDateTo"
        - name: user_id
          in: query
          required: false
          description: Filter berdasarkan user yang melakukan aksi
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          required: false
          description: Filter berdasarkan jenis aksi
          schema:
            type: string
            enum: [ created, updated, deleted, voided, login, logout ]
        - name: auditable_type
          in: query
          required: false
          description: Filter berdasarkan tipe entity (e.g. "Transaction", "Product",
            "User")
          schema:
            type: string
        - name: outlet_id
          in: query
          required: false
          description: Filter per outlet (Owner only)
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/QuerySortDir"
      responses:
        "200":
          description: Daftar audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"

  /api/audit-logs/{id}:
    get:
      tags: [ Audit Logs ]
      summary: Detail audit log
      description: |
        Menampilkan detail lengkap satu entri audit log, termasuk old_values dan new_values.

        **Permission:** `view-outlet-reports` atau `view-global-reports`
      operationId: getAuditLog
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Detail audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/AuditLog"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
