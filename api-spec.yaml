      responses:
        "200":
          description: Daftar kategori
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"

    post:
      tags: [ Categories ]
      summary: Tambah kategori baru
      description: |
        **Permission:** `manage-categories`
      operationId: createCategory
      security:
        - BearerAuth: []
      requestBody:
