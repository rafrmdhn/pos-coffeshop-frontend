      tags: [ Shifts ]
      summary: Buka shift baru
      description: |
        Membuka shift baru untuk outlet. Hanya boleh 1 shift aktif per outlet.
        Gagal jika sudah ada shift berstatus `open`.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.
        Jika belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.

        **Permission:** `open-close-shift` (Manager only)
      operationId: openShift
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenShiftRequest"
      responses:
        "201":
          description: Shift berhasil dibuka
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Shift berhasil dibuka."
                  data:
                    $ref: "#/components/schemas/Shift"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          description: Masih ada shift aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Masih ada shift aktif. Tutup shift terlebih dahulu."
        "422":
          $ref: "#/components/responses/422"

  /api/shifts/close:
    post:
      tags: [ Shifts ]
      summary: Tutup shift (blind drop)
      description: |
        Menutup shift aktif. Kasir wajib menghitung uang fisik per denominasi (blind drop).
        Sistem akan menghitung `expected_cash`, membandingkan dengan `actual_cash`, dan mencatat selisih.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.
        Jika belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.

        **Perhitungan:**
        - `expected_cash = opening_cash + total_cash_sales`
        - `actual_cash = SUM(denomination × qty)`
        - `cash_difference = actual_cash - expected_cash`

        **Permission:** `open-close-shift` (Manager only)  
        **Note:** Cashier bisa submit blind drop via `submit-blind-drop` permission.
      operationId: closeShift
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseShiftRequest"
      responses:
        "200":
          description: Shift berhasil ditutup
          content:
            application/json:
              schema:
