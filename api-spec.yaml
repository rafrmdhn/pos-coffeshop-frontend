          $ref: "#/components/responses/422"

    delete:
      tags: [ Categories ]
      summary: Hapus kategori
      description: |
        Menghapus kategori. Gagal jika masih ada produk aktif di kategori ini.

        **Permission:** `manage-categories`
      operationId: deleteCategory
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Kategori berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Kategori berhasil dihapus."
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Kategori masih memiliki produk
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Kategori tidak bisa dihapus karena masih memiliki 5 produk."

  # ============================================================
  # PRODUCTS
  # ============================================================
  /api/products:
    get:
      tags: [ Products ]
      summary: Daftar produk
      description: |
        Menampilkan daftar produk/menu. Data auto-scoped per outlet.  
        Untuk POS, filter `is_active=true` dan urutkan berdasarkan `sort_order`.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.

        **Permission:** `view-products`
      operationId: listProducts
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QuerySearch"
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/QuerySortBy"
        - $ref: "#/components/parameters/QuerySortDir"
      responses:
        "200":
          description: Daftar produk
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"

    post:
      tags: [ Products ]
      summary: Tambah produk baru
      description: |
        Membuat produk baru. Gambar produk dikirim sebagai multipart form-data.

        **Permission:** `manage-products`
      operationId: createProduct
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StoreProductRequest"
      responses:
        "201":
          description: Produk berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Produk berhasil dibuat."
                  data:
                    $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

  /api/products/{id}:
    put:
      tags: [ Products ]
      summary: Update produk
      description: |
        Memperbarui data produk. Perubahan harga akan dicatat di audit log.

        **Permission:** `manage-products`  
        **Catatan:** Harga di transaksi existing tidak terpengaruh (snapshot).
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StoreProductRequest"
      responses:
        "200":
          description: Produk berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Produk berhasil diperbarui."
                  data:
                    $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"

    delete:
      tags: [ Products ]
      summary: Hapus produk (soft delete)
      description: |
        Soft-delete produk. Produk tidak tampil di POS tapi tetap ada di DB untuk laporan historis.

        **Permission:** `manage-products`
      operationId: deleteProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Produk berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Produk berhasil dihapus."
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"

  # ============================================================
  # RECIPES (BOM)
  # ============================================================
  /api/products/{id}/recipes:
    get:
      tags: [ Recipes ]
      summary: Lihat resep produk (BOM)
      description: |
        Menampilkan daftar bahan baku dan jumlah yang dibutuhkan untuk 1 porsi produk, beserta estimasi HPP.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.

        **Permission:** `manage-recipes`
      operationId: getProductRecipes
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Resep produk
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      product:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                            example: "Caramel Latte"
                          price:
                            type: number
                            format: double
                            example: 32000.00
                      ingredients:
                        type: array
                        items:
                          $ref: "#/components/schemas/RecipeItem"
                      total_hpp:
                        type: number
                        format: double
                        description: Total estimasi HPP (cost) per porsi
                        example: 13.30
                      margin:
                        type: number
                        format: double
                        description: "Margin: price - total_hpp"
                        example: 31986.70
                      margin_percentage:
                        type: number
                        format: double
                        description: "Margin %: (margin / price) × 100"
                        example: 99.96
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"

    put:
      tags: [ Recipes ]
      summary: Update/set resep produk (BOM)
      description: |
        Mengganti seluruh resep produk dengan daftar bahan baru (sync strategy).
        Kirim semua bahan yang dibutuhkan; yang tidak ada di request akan dihapus.

        **Permission:** `manage-recipes`
      operationId: updateProductRecipes
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Resep berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Resep produk berhasil diperbarui."
                  data:
                    type: object
                    properties:
                      ingredients:
                        type: array
                        items:
                          $ref: "#/components/schemas/RecipeItem"
                      total_hpp:
                        type: number
                        format: double
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"

  # ============================================================
  # INVENTORY
  # ============================================================
  /api/inventory:
    get:
      tags: [ Inventory ]
      summary: Daftar bahan baku & stok
      description: |
        Menampilkan seluruh bahan baku dan stok saat ini. Auto-scoped per outlet.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.

        **Permission:** `view-inventory`
      operationId: listInventory
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QuerySearch"
        - name: low_stock
          in: query
          required: false
          description: "Filter hanya stok rendah (current_stock <= min_stock)"
          schema:
            type: boolean
        - $ref: "#/components/parameters/QuerySortBy"
        - $ref: "#/components/parameters/QuerySortDir"
      responses:
        "200":
          description: Daftar bahan baku
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RawMaterial"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

    post:
      tags: [ Inventory ]
      summary: Tambah bahan baku baru
      description: |
        **Permission:** `manage-inventory`
      operationId: createRawMaterial
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreRawMaterialRequest"
      responses:
        "201":
          description: Bahan baku berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Bahan baku berhasil ditambahkan."
                  data:
                    $ref: "#/components/schemas/RawMaterial"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "422":
          $ref: "#/components/responses/422"

  /api/inventory/{id}:
    put:
      tags: [ Inventory ]
      summary: Update bahan baku / restok
      description: |
        Memperbarui data atau jumlah stok bahan baku.  
        Untuk restok, kirim nilai `current_stock` yang baru (absolut, bukan delta).

        **Permission:** `manage-inventory`
      operationId: updateRawMaterial
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRawMaterialRequest"
      responses:
        "200":
          description: Bahan baku berhasil diperbarui
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Bahan baku berhasil diperbarui."
                  data:
                    $ref: "#/components/schemas/RawMaterial"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "422":
          $ref: "#/components/responses/422"

    delete:
      tags: [ Inventory ]
      summary: Hapus bahan baku (soft delete)
      description: |
        Soft-delete bahan baku. Gagal jika masih digunakan sebagai resep produk aktif.

        **Permission:** `manage-inventory`
      operationId: deleteRawMaterial
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Bahan baku berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Bahan baku berhasil dihapus."
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Bahan baku masih digunakan di resep
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Bahan baku tidak bisa dihapus karena masih digunakan oleh 3 resep
                      produk."

  # ============================================================
  # TRANSACTIONS
  # ============================================================
  /api/transactions:
    get:
      tags: [ Transactions ]
      summary: Daftar transaksi
      description: |
        Menampilkan riwayat transaksi. Auto-scoped per outlet.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.

        **Permission:** `view-transactions`
      operationId: listTransactions
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/QueryPage"
        - $ref: "#/components/parameters/QueryPerPage"
        - $ref: "#/components/parameters/QuerySearch"
        - $ref: "#/components/parameters/QueryDateFrom"
        - $ref: "#/components/parameters/QueryDateTo"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ completed, voided ]
        - name: order_type
          in: query
          required: false
          schema:
            type: string
            enum: [ dine_in, takeaway ]
        - name: shift_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter berdasarkan kasir
        - $ref: "#/components/parameters/QuerySortBy"
        - $ref: "#/components/parameters/QuerySortDir"
      responses:
        "200":
          description: Daftar transaksi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  links:
                    $ref: "#/components/schemas/PaginationLinks"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"

    post:
      tags: [ Transactions ]
      summary: Buat transaksi baru
      description: |
        Membuat transaksi penjualan baru. Memerlukan shift aktif (status `open`).

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.
        Jika belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.

        **Proses:**
        1. Validasi produk & stok.
        2. Snapshot harga produk ke `transaction_items`.
        3. Hitung subtotal, diskon (jika voucher), pajak PB1 10%, grand total.
        4. Simpan payment details.
        5. Dispatch `DeductStockJob` (async via queue).
        6. Update voucher `usage_count` jika digunakan.

        **Permission:** `create-transaction`  
        **Middleware:** `ensure.shift.open`
      operationId: createTransaction
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTransactionRequest"
      responses:
        "201":
          description: Transaksi berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Transaksi berhasil."
                  data:
                    $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "409":
          description: Shift belum dibuka
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Tidak ada shift aktif. Buka shift terlebih dahulu."
        "422":
          $ref: "#/components/responses/422"

  /api/transactions/sync:
    post:
      tags: [ Transactions ]
      summary: Sinkronisasi transaksi offline (batch)
      description: |
        Endpoint untuk menyinkronisasi batch transaksi yang dibuat saat offline.
        Setiap transaksi harus memiliki `id` (UUID yang di-generate di client) dan `transaction_date`.

        Untuk Owner, endpoint ini membutuhkan `current_outlet` aktif.
        Jika belum dipilih, API mengembalikan validation error 422 pada field `outlet_id`.

        **Idempotent:** Jika `id` sudah ada di database, transaksi akan di-skip (status `duplicate`).

        **Permission:** `create-transaction`
      operationId: syncTransactions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncTransactionsRequest"
      responses:
        "200":
          description: Hasil sinkronisasi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncTransactionsResponse"
        "401":
          $ref: "#/components/responses/401"
        "422":
          $ref: "#/components/responses/422"

